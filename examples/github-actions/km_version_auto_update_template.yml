name: KM Version Auto Update

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: translation-state-master
  cancel-in-progress: false

env:
  TOOLING_REPOSITORY: ThreeMonth03/dsw-km-translation-tool
  TOOLING_REF: master
  TRACKING_BRANCH: master
  TRANSLATION_CONFIG: translation-config.yml

jobs:
  update-km-version:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout translation repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TRACKING_BRANCH }}
          path: translation-repo
          fetch-depth: 0

      - name: Checkout DSW KM Translation Tool
        uses: actions/checkout@v5
        with:
          repository: ${{ env.TOOLING_REPOSITORY }}
          ref: ${{ env.TOOLING_REF }}
          path: tooling-repo

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install tooling dependencies
        working-directory: tooling-repo
        run: make install-dev BOOTSTRAP_PYTHON=python

      - name: Update to latest published KM when safe
        env:
          DSW_REGISTRY_TOKEN: ${{ secrets.DSW_REGISTRY_TOKEN }}
        run: >-
          tooling-repo/.venv/bin/dsw-km-sync-latest-km
          --repo-root "$GITHUB_WORKSPACE/translation-repo"
          --tooling-repo "$GITHUB_WORKSPACE/tooling-repo"
          --config "${{ env.TRANSLATION_CONFIG }}"
          --target-ref "${{ env.TRACKING_BRANCH }}"
          --report "$RUNNER_TEMP/km_auto_update_report.json"
          --details-out "$RUNNER_TEMP/km_auto_update_report.md"
          --summary "$GITHUB_STEP_SUMMARY"

      - name: Upload KM auto-update report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: km-version-auto-update
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/km_auto_update_report.json
            ${{ runner.temp }}/km_auto_update_report.md
