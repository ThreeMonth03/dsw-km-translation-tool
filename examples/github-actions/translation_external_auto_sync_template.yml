name: External Translation Auto Sync Template

on:
  schedule:
    - cron: "0 1,13 * * *"
  pull_request:
    branches: [translation/latest]

permissions:
  contents: write

concurrency:
  group: >-
    external-translation-auto-sync-${{ github.event_name == 'pull_request' &&
    github.event.pull_request.head.ref || 'translation/latest' }}
  cancel-in-progress: false

env:
  TOOLING_REPOSITORY: ThreeMonth03/DSW_Translation_tool
  TOOLING_REF: master
  TRACKING_BRANCH: translation/latest
  TRANSLATION_CONFIG: translation-config.yml
  TRANSLATION_ROOT: .

jobs:
  sync-writer:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'schedule' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout translation repository
        uses: actions/checkout@v4
        with:
          ref: >-
            ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.ref || env.TRACKING_BRANCH }}
          path: translation-repo
          fetch-depth: 0

      - name: Fetch tracking branch for recovery restores
        working-directory: translation-repo
        run: >-
          git fetch origin
          "${{ env.TRACKING_BRANCH }}:refs/remotes/origin/${{ env.TRACKING_BRANCH }}"

      - name: Checkout tooling repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TOOLING_REPOSITORY }}
          ref: ${{ env.TOOLING_REF }}
          path: tooling-repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tooling dependencies
        working-directory: tooling-repo
        run: make install-dev BOOTSTRAP_PYTHON=python

      - name: Discover upstream KM versions
        run: >-
          tooling-repo/.venv/bin/python tooling-repo/src/discover_km_versions.py
          --repo-root "$GITHUB_WORKSPACE/translation-repo"
          --config "${{ env.TRANSLATION_CONFIG }}"
          --report reviews/km_version_discovery.json

      - name: Sync to latest KM version
        env:
          DSW_REGISTRY_TOKEN: ${{ secrets.DSW_REGISTRY_TOKEN }}
        run: >-
          tooling-repo/.venv/bin/python tooling-repo/src/sync_latest_km.py
          --repo-root "$GITHUB_WORKSPACE/translation-repo"
          --tooling-repo "$GITHUB_WORKSPACE/tooling-repo"
          --config "${{ env.TRANSLATION_CONFIG }}"
          --skip-without-token

      - name: Pull latest Localize PO snapshot
        run: >-
          tooling-repo/.venv/bin/python tooling-repo/src/pull_localize_po.py
          --repo-root "$GITHUB_WORKSPACE/translation-repo"
          --config "${{ env.TRANSLATION_CONFIG }}"

      # This helper may restore malformed translation.md or one split
      # shared_blocks/<group-id>/context.md file from the tracking branch once,
      # then rerun sync. That keeps CI unblocked, but can overwrite malformed
      # PR-branch edits.
      - name: Sync, validate, and auto-commit translation artifacts
        run: >-
          tooling-repo/.venv/bin/python tooling-repo/src/ci_sync_commit.py
          --host-repo "$GITHUB_WORKSPACE/translation-repo"
          --tooling-repo "$GITHUB_WORKSPACE/tooling-repo"
          --config "${{ env.TRANSLATION_CONFIG }}"
          --translation-root "${{ env.TRANSLATION_ROOT }}"
          --target-ref "${{ github.event_name == 'pull_request' &&
          github.event.pull_request.head.ref || env.TRACKING_BRANCH }}"
          --restore-source-ref "origin/${{ env.TRACKING_BRANCH }}"
          --mode "${{ github.event_name }}"

  skip-fork-pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Explain fork PR skip policy
        run: echo "Skipping auto-sync commit for fork pull requests."
