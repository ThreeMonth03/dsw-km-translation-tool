name: KM Translation Operations

on:
  pull_request:
    branches: ["{{TRACKING_BRANCH}}"]
  push:
    branches:
      - "{{TRACKING_BRANCH}}"
  workflow_dispatch:

permissions:
  contents: read

env:
  TOOLING_REPOSITORY: {{TOOLING_REPOSITORY}}
  TOOLING_REF: {{TOOLING_REF}}

jobs:
  validate-translation-config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout translation operations repository
        uses: actions/checkout@v5
        with:
          path: translation-repo
          fetch-depth: 0

      - name: Checkout DSW KM Translation Tool
        uses: actions/checkout@v5
        with:
          repository: ${{ env.TOOLING_REPOSITORY }}
          ref: ${{ env.TOOLING_REF }}
          path: tooling-repo

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install tooling dependencies
        working-directory: tooling-repo
        run: make install-dev BOOTSTRAP_PYTHON=python

      - name: Validate translation configuration
        run: >-
          tooling-repo/.venv/bin/dsw-km-validate-config
          --config "$GITHUB_WORKSPACE/translation-repo/translation-config.yml"
          --summary "$GITHUB_STEP_SUMMARY"

      - name: Check managed repository scaffold
        run: >-
          tooling-repo/.venv/bin/dsw-km-scaffold check
          --repo-root "$GITHUB_WORKSPACE/translation-repo"
          --tooling-repo "$GITHUB_WORKSPACE/tooling-repo"
