name: Localize Translation Auto Sync

on:
  schedule:
    - cron: "0 1,13 * * *"
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: >-
    ${{ github.event_name == 'pull_request' &&
    format('translation-pr-{0}', github.event.pull_request.head.ref) ||
    'translation-state-master' }}
  cancel-in-progress: false

env:
  TOOLING_REPOSITORY: ThreeMonth03/dsw-km-translation-tool
  TOOLING_REF: master
  TRACKING_BRANCH: master
  TRANSLATION_CONFIG: translation-config.yml
  TRANSLATION_ROOT: .

jobs:
  sync-writer:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request translation repository
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: translation-repo
          fetch-depth: 0

      - name: Checkout tracking translation repository
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TRACKING_BRANCH }}
          path: translation-repo
          fetch-depth: 0

      - name: Fetch tracking branch for recovery restores
        working-directory: translation-repo
        run: >-
          git fetch "https://github.com/${{ github.repository }}.git"
          "${{ env.TRACKING_BRANCH }}:refs/remotes/base/${{ env.TRACKING_BRANCH }}"

      - name: Fetch pull request base commit
        if: github.event_name == 'pull_request'
        working-directory: translation-repo
        run: >-
          git fetch
          "https://github.com/${{ github.event.pull_request.base.repo.full_name }}.git"
          "${{ github.event.pull_request.base.sha }}:refs/remotes/base/pr-base"

      - name: Check pull request head branch
        id: head-branch
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        working-directory: translation-repo
        run: |
          if git ls-remote --exit-code --heads origin "${{ github.event.pull_request.head.ref }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout DSW KM Translation Tool
        uses: actions/checkout@v5
        with:
          repository: ${{ env.TOOLING_REPOSITORY }}
          ref: ${{ env.TOOLING_REF }}
          path: tooling-repo

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install tooling dependencies
        working-directory: tooling-repo
        run: make install-dev BOOTSTRAP_PYTHON=python

      - name: Report GitHub translation changes
        id: github-translations
        if: github.event_name == 'pull_request'
        run: >-
          tooling-repo/.venv/bin/dsw-km-report-github-translations
          --repo-root "$GITHUB_WORKSPACE/translation-repo"
          --config "${{ env.TRANSLATION_CONFIG }}"
          --base-ref "base/pr-base"
          --head-ref "HEAD"
          --json-out "$RUNNER_TEMP/github_translation_report.json"
          --details-out "$RUNNER_TEMP/github_translation_report.md"
          --summary "$GITHUB_STEP_SUMMARY"
          --github-output "$GITHUB_OUTPUT"

      - name: Upload GitHub translation report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: github-translation-report
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/github_translation_report.json
            ${{ runner.temp }}/github_translation_report.md

      - name: Explain translation PR sync skip
        if: >-
          github.event_name == 'pull_request' &&
          steps.github-translations.outputs.has_translation_changes == 'true'
        run: >-
          echo "This PR changes translation text. Weblate-to-Git writer sync is
          skipped so the reviewed GitHub translation can be imported after
          merge."

      - name: Explain fork PR sync skip
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        run: echo "This workflow reports fork PR translation changes but never writes to forks."

      - name: Explain deleted PR branch sync skip
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          steps.head-branch.outputs.exists != 'true'
        run: echo "The pull request head branch no longer exists. Weblate-to-Git writer sync is skipped."

      - name: Pull Localize, sync, validate, and auto-commit artifacts
        if: >-
          github.event_name != 'pull_request' ||
          (github.event.pull_request.head.repo.full_name == github.repository &&
          steps.head-branch.outputs.exists == 'true' &&
          steps.github-translations.outputs.has_translation_changes != 'true')
        env:
          SYNC_MODE: ${{ github.event_name == 'pull_request' && 'pull_request' || 'schedule' }}
        run: >-
          tooling-repo/.venv/bin/dsw-km-sync-localize
          --host-repo "$GITHUB_WORKSPACE/translation-repo"
          --tooling-repo "$GITHUB_WORKSPACE/tooling-repo"
          --config "${{ env.TRANSLATION_CONFIG }}"
          --translation-root "${{ env.TRANSLATION_ROOT }}"
          --target-ref "${{ github.event_name == 'pull_request' &&
          github.event.pull_request.head.ref || env.TRACKING_BRANCH }}"
          --restore-source-ref "base/${{ env.TRACKING_BRANCH }}"
          --mode "$SYNC_MODE"
