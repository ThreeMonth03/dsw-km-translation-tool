name: Localize Translation Auto Sync

on:
  schedule:
    - cron: "0 1,13 * * *"
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: >-
    localize-translation-auto-sync-${{ github.event_name == 'pull_request' &&
    github.event.pull_request.head.ref || 'master' }}
  cancel-in-progress: false

env:
  TOOLING_REPOSITORY: ThreeMonth03/dsw-km-translation-tool
  TOOLING_REF: master
  TRACKING_BRANCH: master
  TRANSLATION_CONFIG: translation-config.yml
  TRANSLATION_ROOT: .

jobs:
  sync-writer:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout translation repository
        uses: actions/checkout@v5
        with:
          ref: >-
            ${{ github.event_name == 'pull_request' &&
            github.event.pull_request.head.ref || env.TRACKING_BRANCH }}
          path: translation-repo
          fetch-depth: 0

      - name: Fetch tracking branch for recovery restores
        working-directory: translation-repo
        run: >-
          git fetch origin
          "${{ env.TRACKING_BRANCH }}:refs/remotes/origin/${{ env.TRACKING_BRANCH }}"

      - name: Checkout DSW KM Translation Tooling
        uses: actions/checkout@v5
        with:
          repository: ${{ env.TOOLING_REPOSITORY }}
          ref: ${{ env.TOOLING_REF }}
          path: tooling-repo

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install tooling dependencies
        working-directory: tooling-repo
        run: make install-dev BOOTSTRAP_PYTHON=python

      - name: Pull Localize, sync, validate, and auto-commit artifacts
        env:
          SYNC_MODE: ${{ github.event_name == 'pull_request' && 'pull_request' || 'schedule' }}
        run: >-
          tooling-repo/.venv/bin/dsw-km-sync-localize
          --host-repo "$GITHUB_WORKSPACE/translation-repo"
          --tooling-repo "$GITHUB_WORKSPACE/tooling-repo"
          --config "${{ env.TRANSLATION_CONFIG }}"
          --translation-root "${{ env.TRANSLATION_ROOT }}"
          --target-ref "${{ github.event_name == 'pull_request' &&
          github.event.pull_request.head.ref || env.TRACKING_BRANCH }}"
          --restore-source-ref "origin/${{ env.TRACKING_BRANCH }}"
          --mode "$SYNC_MODE"

  skip-fork-pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Explain fork PR skip policy
        run: echo "Skipping auto-sync commit for fork pull requests."
